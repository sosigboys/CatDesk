version: '3.8'

services:
  signaling:
    build: .
    restart: unless-stopped
    environment:
      - PORT=3000
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - signaling
    networks:
      - internal

networks:
  internal:
    driver: bridge
